<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Dashboard</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['Space Mono', 'monospace'], sans: ['DM Sans', 'sans-serif'] },
          colors: {
            brand: { 50:'#f0f4ff', 500:'#4f6ef7', 600:'#3a57e8', 700:'#2d45cc' },
            ink: { DEFAULT:'#0f1117', 900:'#0f1117', 800:'#1a1d2e', 700:'#252840', 600:'#363952', 500:'#4a4e6a' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0f1117; }
    .grid-bg {
      background-image: linear-gradient(rgba(79,110,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,110,247,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.4s ease forwards; }
    .team-card:hover .arrow { transform: translateX(4px); }
    .arrow { transition: transform 0.2s; }
    .modal-overlay { backdrop-filter: blur(4px); }

    /* Shimmer skeleton */
    @keyframes shimmer {
      0% { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #1a1d2e 25%, #252840 50%, #1a1d2e 75%);
      background-size: 600px 100%;
      animation: shimmer 1.6s infinite linear;
      border-radius: 6px;
    }
  </style>
</head>
<body class="grid-bg min-h-screen text-white">

  <!-- Navbar -->
  <nav class="border-b border-white/10 bg-ink-900/80 backdrop-blur-sm sticky top-0 z-40">
    <div class="max-w-6xl mx-auto px-4 sm:px-6 h-16 flex items-center justify-between">
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-brand-500 rounded-lg flex items-center justify-center">
          <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
          </svg>
        </div>
        <span class="font-mono font-bold text-white text-base">TaskFlow</span>
      </div>
      <div class="flex items-center gap-3">
        <div id="userBadge" class="flex items-center gap-2.5">
          <div id="avatarCircle" class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold"></div>
          <span id="usernameDisplay" class="text-sm text-gray-300 hidden sm:block"></span>
        </div>
        <button onclick="logout()" class="text-gray-400 hover:text-white text-sm transition px-3 py-1.5 rounded-lg hover:bg-white/10">
          Sign out
        </button>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="max-w-6xl mx-auto px-4 sm:px-6 py-10">
    <div class="fade-up flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-10">
      <div>
        <h1 class="text-3xl font-bold text-white mb-1">Your Teams</h1>
        <p class="text-gray-400 text-sm">Select a team to view its Kanban board.</p>
      </div>
      <button onclick="openCreateModal()"
        class="flex items-center gap-2 bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium px-5 py-2.5 rounded-xl transition shrink-0">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        New Team
      </button>
    </div>

    <!-- Teams grid -->
    <div id="teamsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
      <!-- Skeleton cards shown while loading (same shape as real team cards) -->
      <div class="skeleton-card bg-ink-800 border border-white/10 rounded-2xl p-5">
        <div class="flex items-start justify-between mb-4">
          <div class="skeleton w-11 h-11 rounded-xl"></div>
          <div class="skeleton w-14 h-5 rounded-full"></div>
        </div>
        <div class="skeleton w-2/3 h-4 mb-2"></div>
        <div class="skeleton w-full h-3 mb-1.5"></div>
        <div class="skeleton w-4/5 h-3 mb-5"></div>
        <div class="flex items-center justify-between">
          <div class="skeleton w-16 h-3"></div>
          <div class="skeleton w-4 h-4 rounded"></div>
        </div>
      </div>
      <div class="skeleton-card bg-ink-800 border border-white/10 rounded-2xl p-5">
        <div class="flex items-start justify-between mb-4">
          <div class="skeleton w-11 h-11 rounded-xl"></div>
          <div class="skeleton w-16 h-5 rounded-full"></div>
        </div>
        <div class="skeleton w-1/2 h-4 mb-2"></div>
        <div class="skeleton w-full h-3 mb-1.5"></div>
        <div class="skeleton w-3/5 h-3 mb-5"></div>
        <div class="flex items-center justify-between">
          <div class="skeleton w-20 h-3"></div>
          <div class="skeleton w-4 h-4 rounded"></div>
        </div>
      </div>
      <div class="skeleton-card bg-ink-800 border border-white/10 rounded-2xl p-5">
        <div class="flex items-start justify-between mb-4">
          <div class="skeleton w-11 h-11 rounded-xl"></div>
          <div class="skeleton w-12 h-5 rounded-full"></div>
        </div>
        <div class="skeleton w-3/4 h-4 mb-2"></div>
        <div class="skeleton w-full h-3 mb-1.5"></div>
        <div class="skeleton w-2/3 h-3 mb-5"></div>
        <div class="flex items-center justify-between">
          <div class="skeleton w-14 h-3"></div>
          <div class="skeleton w-4 h-4 rounded"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- Create Team Modal -->
  <div id="createModal" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4">
    <div class="modal-overlay absolute inset-0 bg-black/60" onclick="closeCreateModal()"></div>
    <div class="relative bg-ink-800 border border-white/15 rounded-2xl p-6 w-full max-w-md shadow-2xl fade-up">
      <h2 class="text-lg font-semibold text-white mb-5">Create New Team</h2>
      <div id="modalError" class="hidden bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg px-4 py-3 mb-4"></div>
      <div class="space-y-4">
        <div>
          <label class="block text-gray-400 text-xs font-medium uppercase tracking-wider mb-1.5">Team Name</label>
          <input id="teamName" type="text" placeholder="e.g. Engineering"
            class="w-full bg-ink-700 border border-white/10 rounded-xl px-4 py-2.5 text-white placeholder-gray-600 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition text-sm" />
        </div>
        <div>
          <label class="block text-gray-400 text-xs font-medium uppercase tracking-wider mb-1.5">Description <span class="normal-case text-gray-600">(optional)</span></label>
          <input id="teamDesc" type="text" placeholder="What does this team work on?"
            class="w-full bg-ink-700 border border-white/10 rounded-xl px-4 py-2.5 text-white placeholder-gray-600 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition text-sm" />
        </div>
        <div class="flex gap-3 pt-2">
          <button onclick="closeCreateModal()" class="flex-1 bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 font-medium py-2.5 rounded-xl transition text-sm">Cancel</button>
          <button onclick="createTeam()" class="flex-1 bg-brand-500 hover:bg-brand-600 text-white font-medium py-2.5 rounded-xl transition text-sm">Create Team</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/api.js"></script>
  <script>
    let currentUser = null;

    const TEAM_COLORS = ['from-violet-600 to-indigo-600','from-blue-600 to-cyan-600','from-emerald-600 to-teal-600',
      'from-orange-600 to-amber-600','from-pink-600 to-rose-600','from-red-600 to-orange-600'];

    async function init() {
      const r = await apiFetch('/api/me');
      if (r.status === 401) return window.location = '/login';
      if (!r.ok) return;
      currentUser = await parseJsonResponse(r);
      if (currentUser.error) return;
      document.getElementById('avatarCircle').textContent = currentUser.username[0].toUpperCase();
      document.getElementById('avatarCircle').style.background = currentUser.avatar_color;
      document.getElementById('usernameDisplay').textContent = currentUser.username;
      loadTeams();
    }

    async function loadTeams() {
      const r = await apiFetch('/api/teams');
      if (!r.ok) return;
      const teams = await parseJsonResponse(r);
      if (!Array.isArray(teams)) return;
      const grid = document.getElementById('teamsGrid');
      // Clear skeleton placeholders
      grid.innerHTML = '';

      if (!teams.length) {
        grid.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center py-20 text-center">
          <div class="w-16 h-16 bg-ink-800 border border-white/10 rounded-2xl flex items-center justify-center mb-4">
            <svg class="w-8 h-8 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          </div>
          <p class="text-gray-300 font-medium mb-1">No teams yet</p>
          <p class="text-gray-500 text-sm mb-5">Create your first team to start managing tasks.</p>
          <button onclick="openCreateModal()" class="bg-brand-500 hover:bg-brand-600 text-white text-sm font-medium px-5 py-2.5 rounded-xl transition">Create a Team</button>
        </div>`;
        return;
      }

      grid.innerHTML = '';
      teams.forEach((team, i) => {
        const color = TEAM_COLORS[i % TEAM_COLORS.length];
        const initials = team.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
        const card = document.createElement('div');
        card.className = 'team-card bg-ink-800 border border-white/10 hover:border-white/20 rounded-2xl p-5 cursor-pointer transition-all hover:bg-ink-700 fade-up';
        card.style.animationDelay = `${i * 0.07}s`;
        card.onclick = () => window.location = `/board/${team.id}`;
        card.innerHTML = `
          <div class="flex items-start justify-between mb-4">
            <div class="w-11 h-11 rounded-xl bg-gradient-to-br ${color} flex items-center justify-center text-white font-bold text-sm">${initials}</div>
            <span class="text-xs px-2.5 py-1 rounded-full border ${team.role === 'owner' ? 'border-brand-500/40 text-brand-500 bg-brand-500/10' : 'border-white/10 text-gray-400 bg-white/5'}">${team.role}</span>
          </div>
          <h3 class="text-white font-semibold mb-1">${escHtml(team.name)}</h3>
          <p class="text-gray-500 text-sm mb-4 line-clamp-2">${escHtml(team.description || 'No description')}</p>
          <div class="flex items-center justify-between">
            <span class="text-gray-600 text-xs">${new Date(team.created_at).toLocaleDateString()}</span>
            <svg class="arrow w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </div>`;
        grid.appendChild(card);
      });
    }

    function openCreateModal() {
      document.getElementById('createModal').classList.remove('hidden');
      setTimeout(() => document.getElementById('teamName').focus(), 50);
    }
    function closeCreateModal() {
      document.getElementById('createModal').classList.add('hidden');
      document.getElementById('teamName').value = '';
      document.getElementById('teamDesc').value = '';
      document.getElementById('modalError').classList.add('hidden');
    }

    async function createTeam() {
      const name = document.getElementById('teamName').value.trim();
      if (!name) return;
      const desc = document.getElementById('teamDesc').value.trim();
      const r = await apiFetch('/api/teams', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name, description: desc })
      });
      const d = await parseJsonResponse(r);
      if (d.error) {
        const el = document.getElementById('modalError');
        el.textContent = d.error; el.classList.remove('hidden');
        return;
      }
      closeCreateModal();
      loadTeams();
    }

    async function logout() {
      await apiFetch('/api/auth/logout', { method: 'POST' });
      window.location = '/login';
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    init();
  </script>
</body>
</html>
