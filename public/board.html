<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Board</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['Space Mono', 'monospace'], sans: ['DM Sans', 'sans-serif'] },
          colors: {
            brand: { 500:'#4f6ef7', 600:'#3a57e8' },
            ink: { DEFAULT:'#0f1117', 900:'#0f1117', 800:'#1a1d2e', 700:'#252840', 600:'#363952', 500:'#4a4e6a' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0f1117; }
    .grid-bg {
      background-image: linear-gradient(rgba(79,110,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,110,247,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.35s ease forwards; }
    .task-card { cursor: grab; transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s; }
    .task-card:active { cursor: grabbing; }
    .task-card.dragging { opacity: 0.4; transform: scale(0.97); }
    .kanban-col.drag-over .drop-zone { background: rgba(79,110,247,0.08); border-color: rgba(79,110,247,0.4); }
    .drop-zone { border: 2px dashed transparent; border-radius: 12px; min-height: 60px; transition: all 0.2s; }
    .priority-urgent { border-left: 3px solid #ef4444; }
    .priority-high { border-left: 3px solid #f97316; }
    .priority-medium { border-left: 3px solid #eab308; }
    .priority-low { border-left: 3px solid #22c55e; }
    .modal-overlay { backdrop-filter: blur(6px); }
    .tab-active { color: white; border-bottom: 2px solid #4f6ef7; }
    .tab-inactive { color: #6b7280; border-bottom: 2px solid transparent; }
    .sidebar-slide { transition: transform 0.3s cubic-bezier(0.4,0,0.2,1); }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #363952; border-radius: 4px; }
    .overdue { color: #f87171; }
    .due-soon { color: #fbbf24; }
    select option { background: #1a1d2e; }
    .poll-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* Shimmer skeleton */
    @keyframes shimmer {
      0% { background-position: -600px 0; }
      100% { background-position: 600px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #1a1d2e 25%, #252840 50%, #1a1d2e 75%);
      background-size: 600px 100%;
      animation: shimmer 1.6s infinite linear;
      border-radius: 6px;
    }
    .skeleton-card {
      background: linear-gradient(90deg, #1a1d2e 25%, #252840 50%, #1a1d2e 75%);
      background-size: 600px 100%;
      animation: shimmer 1.6s infinite linear;
    }
  </style>
</head>
<body class="grid-bg min-h-screen text-white flex flex-col">

  <!-- Navbar -->
  <nav class="border-b border-white/10 bg-ink-900/90 backdrop-blur-sm sticky top-0 z-40">
    <div class="px-4 sm:px-6 h-14 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <a href="/dashboard" class="text-gray-400 hover:text-white transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
          </svg>
        </a>
        <div class="w-px h-5 bg-white/10"></div>
        <div class="w-6 h-6 bg-brand-500 rounded-md flex items-center justify-center shrink-0">
          <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
          </svg>
        </div>
        <h1 id="teamName" class="font-semibold text-white text-sm truncate">Loading...</h1>
        <div class="poll-dot w-2 h-2 rounded-full bg-emerald-500 shrink-0" title="Live updates active"></div>
      </div>
      <div class="flex items-center gap-2">
        <div id="memberAvatars" class="flex items-center -space-x-2 mr-1"></div>
        <button onclick="openTeamPanel()" class="text-gray-400 hover:text-white text-xs px-3 py-1.5 rounded-lg hover:bg-white/10 transition flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <span class="hidden sm:inline">Team</span>
        </button>
        <button onclick="openActivityPanel()" class="text-gray-400 hover:text-white text-xs px-3 py-1.5 rounded-lg hover:bg-white/10 transition flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
          <span class="hidden sm:inline">Activity</span>
        </button>
        <button id="settingsNavBtn" onclick="openSettingsPanel()" class="hidden text-gray-400 hover:text-white text-xs px-3 py-1.5 rounded-lg hover:bg-white/10 transition flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          <span class="hidden sm:inline">Settings</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Board -->
  <div class="flex-1 flex overflow-hidden">
    <div id="boardContainer" class="flex-1 overflow-x-auto p-4 sm:p-6">
      <div class="flex gap-4 h-full min-h-[calc(100vh-3.5rem-2rem)]" style="min-width: 700px;">

        <!-- TO DO Column -->
        <div class="kanban-col flex-1 flex flex-col min-w-0" data-status="todo">
          <div class="flex items-center justify-between mb-3 px-1">
            <div class="flex items-center gap-2">
              <div class="w-2.5 h-2.5 rounded-full bg-gray-500"></div>
              <span class="text-xs font-semibold text-gray-400 uppercase tracking-widest">To Do</span>
              <span id="count-todo" class="text-xs bg-white/10 text-gray-400 rounded-full px-2 py-0.5">0</span>
            </div>
            <button onclick="openAddTask('todo')" class="text-gray-500 hover:text-white transition p-1 rounded-lg hover:bg-white/10">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
            </button>
          </div>
          <div class="drop-zone flex-1 rounded-xl p-2 space-y-2" id="col-todo"
            ondragover="dragOver(event)" ondrop="drop(event)" ondragleave="dragLeave(event)">
            <!-- Task skeletons shown while loading -->
            <div class="task-skeleton border-l-2 border-gray-700 bg-ink-800 border border-white/10 rounded-xl p-3.5">
              <div class="flex items-start justify-between gap-2 mb-2.5">
                <div class="skeleton h-3.5 w-3/4 rounded"></div>
                <div class="skeleton h-5 w-14 rounded-md shrink-0"></div>
              </div>
              <div class="skeleton h-2.5 w-full rounded mb-1.5"></div>
              <div class="skeleton h-2.5 w-2/3 rounded mb-3.5"></div>
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-1.5">
                  <div class="skeleton w-5 h-5 rounded-full"></div>
                  <div class="skeleton h-2.5 w-16 rounded"></div>
                </div>
                <div class="skeleton h-2.5 w-12 rounded"></div>
              </div>
            </div>
            <div class="task-skeleton border-l-2 border-gray-700 bg-ink-800 border border-white/10 rounded-xl p-3.5">
              <div class="flex items-start justify-between gap-2 mb-2.5">
                <div class="skeleton h-3.5 w-1/2 rounded"></div>
                <div class="skeleton h-5 w-16 rounded-md shrink-0"></div>
              </div>
              <div class="skeleton h-2.5 w-4/5 rounded mb-3.5"></div>
              <div class="flex items-center justify-between">
                <div class="skeleton h-2.5 w-0 rounded"></div>
                <div class="skeleton h-2.5 w-14 rounded"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- DOING Column -->
        <div class="kanban-col flex-1 flex flex-col min-w-0" data-status="doing">
          <div class="flex items-center justify-between mb-3 px-1">
            <div class="flex items-center gap-2">
              <div class="w-2.5 h-2.5 rounded-full bg-brand-500"></div>
              <span class="text-xs font-semibold text-brand-500 uppercase tracking-widest">Doing</span>
              <span id="count-doing" class="text-xs bg-brand-500/20 text-brand-500 rounded-full px-2 py-0.5">0</span>
            </div>
            <button onclick="openAddTask('doing')" class="text-gray-500 hover:text-white transition p-1 rounded-lg hover:bg-white/10">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
            </button>
          </div>
          <div class="drop-zone flex-1 rounded-xl p-2 space-y-2" id="col-doing"
            ondragover="dragOver(event)" ondrop="drop(event)" ondragleave="dragLeave(event)">
            <div class="task-skeleton border-l-2 border-gray-700 bg-ink-800 border border-white/10 rounded-xl p-3.5">
              <div class="flex items-start justify-between gap-2 mb-2.5">
                <div class="skeleton h-3.5 w-2/3 rounded"></div>
                <div class="skeleton h-5 w-12 rounded-md shrink-0"></div>
              </div>
              <div class="skeleton h-2.5 w-full rounded mb-1.5"></div>
              <div class="skeleton h-2.5 w-3/4 rounded mb-3.5"></div>
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-1.5">
                  <div class="skeleton w-5 h-5 rounded-full"></div>
                  <div class="skeleton h-2.5 w-14 rounded"></div>
                </div>
                <div class="skeleton h-2.5 w-16 rounded"></div>
              </div>
            </div>
            <div class="task-skeleton border-l-2 border-gray-700 bg-ink-800 border border-white/10 rounded-xl p-3.5">
              <div class="flex items-start justify-between gap-2 mb-2.5">
                <div class="skeleton h-3.5 w-4/5 rounded"></div>
                <div class="skeleton h-5 w-16 rounded-md shrink-0"></div>
              </div>
              <div class="skeleton h-2.5 w-2/3 rounded mb-3.5"></div>
              <div class="flex items-center justify-between">
                <div class="skeleton h-2.5 w-0 rounded"></div>
                <div class="skeleton h-2.5 w-10 rounded"></div>
              </div>
            </div>
            <div class="task-skeleton border-l-2 border-gray-700 bg-ink-800 border border-white/10 rounded-xl p-3.5">
              <div class="flex items-start justify-between gap-2 mb-2.5">
                <div class="skeleton h-3.5 w-1/2 rounded"></div>
                <div class="skeleton h-5 w-14 rounded-md shrink-0"></div>
              </div>
              <div class="skeleton h-2.5 w-full rounded mb-1.5"></div>
              <div class="skeleton h-2.5 w-1/2 rounded mb-3.5"></div>
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-1.5">
                  <div class="skeleton w-5 h-5 rounded-full"></div>
                  <div class="skeleton h-2.5 w-12 rounded"></div>
                </div>
                <div class="skeleton h-2.5 w-0 rounded"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- DONE Column -->
        <div class="kanban-col flex-1 flex flex-col min-w-0" data-status="done">
          <div class="flex items-center justify-between mb-3 px-1">
            <div class="flex items-center gap-2">
              <div class="w-2.5 h-2.5 rounded-full bg-emerald-500"></div>
              <span class="text-xs font-semibold text-emerald-500 uppercase tracking-widest">Done</span>
              <span id="count-done" class="text-xs bg-emerald-500/20 text-emerald-500 rounded-full px-2 py-0.5">0</span>
            </div>
            <button onclick="openAddTask('done')" class="text-gray-500 hover:text-white transition p-1 rounded-lg hover:bg-white/10">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
            </button>
          </div>
          <div class="drop-zone flex-1 rounded-xl p-2 space-y-2" id="col-done"
            ondragover="dragOver(event)" ondrop="drop(event)" ondragleave="dragLeave(event)">
            <div class="task-skeleton border-l-2 border-gray-700 bg-ink-800 border border-white/10 rounded-xl p-3.5">
              <div class="flex items-start justify-between gap-2 mb-2.5">
                <div class="skeleton h-3.5 w-3/5 rounded"></div>
                <div class="skeleton h-5 w-10 rounded-md shrink-0"></div>
              </div>
              <div class="skeleton h-2.5 w-4/5 rounded mb-3.5"></div>
              <div class="flex items-center justify-between">
                <div class="flex items-center gap-1.5">
                  <div class="skeleton w-5 h-5 rounded-full"></div>
                  <div class="skeleton h-2.5 w-16 rounded"></div>
                </div>
                <div class="skeleton h-2.5 w-12 rounded"></div>
              </div>
            </div>
            <div class="task-skeleton border-l-2 border-gray-700 bg-ink-800 border border-white/10 rounded-xl p-3.5">
              <div class="flex items-start justify-between gap-2 mb-2.5">
                <div class="skeleton h-3.5 w-2/3 rounded"></div>
                <div class="skeleton h-5 w-14 rounded-md shrink-0"></div>
              </div>
              <div class="skeleton h-2.5 w-full rounded mb-1.5"></div>
              <div class="skeleton h-2.5 w-3/5 rounded mb-3.5"></div>
              <div class="flex items-center justify-between">
                <div class="skeleton h-2.5 w-0 rounded"></div>
                <div class="skeleton h-2.5 w-16 rounded"></div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- Activity Side Panel -->
    <div id="activityPanel" class="sidebar-slide hidden border-l border-white/10 bg-ink-800 w-80 flex flex-col shrink-0">
      <div class="p-4 border-b border-white/10 flex items-center justify-between">
        <h2 class="font-semibold text-sm text-white">Activity</h2>
        <button onclick="closeActivityPanel()" class="text-gray-500 hover:text-white transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
      <div id="activityList" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
    </div>

    <!-- Team Side Panel -->
    <div id="teamPanel" class="sidebar-slide hidden border-l border-white/10 bg-ink-800 w-80 flex flex-col shrink-0">
      <div class="p-4 border-b border-white/10 flex items-center justify-between">
        <h2 class="font-semibold text-sm text-white">Team Members</h2>
        <button onclick="closeTeamPanel()" class="text-gray-500 hover:text-white transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
      <div class="p-4 border-b border-white/10" id="inviteSection">
        <p class="text-xs text-gray-400 mb-2">Invite by email</p>
        <div class="flex gap-2">
          <input id="inviteEmail" type="email" placeholder="colleague@email.com"
            class="flex-1 bg-ink-700 border border-white/10 rounded-lg px-3 py-2 text-white placeholder-gray-600 text-xs focus:outline-none focus:border-brand-500 transition" />
          <button onclick="inviteMember()" class="bg-brand-500 hover:bg-brand-600 text-white text-xs px-3 py-2 rounded-lg transition font-medium">Invite</button>
        </div>
        <p id="inviteMsg" class="text-xs mt-2 hidden"></p>
      </div>
      <div id="memberList" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
    </div>

    <!-- Team Settings Panel (owners only) -->
    <div id="settingsPanel" class="sidebar-slide hidden border-l border-white/10 bg-ink-800 w-80 flex flex-col shrink-0">
      <div class="p-4 border-b border-white/10 flex items-center justify-between">
        <h2 class="font-semibold text-sm text-white">Team Settings</h2>
        <button onclick="closeSettingsPanel()" class="text-gray-500 hover:text-white transition">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
      <div class="flex-1 overflow-y-auto p-4">
        <p class="text-xs text-gray-400 mb-3">Remove members</p>
        <div id="settingsMemberList" class="space-y-2 mb-6"></div>
        <div class="border-t border-white/10 pt-4">
          <p class="text-xs text-gray-400 mb-3">Danger zone</p>
          <p class="text-xs text-gray-500 mb-3 leading-relaxed">Permanently delete this team, all tasks, comments, and activity. This cannot be undone.</p>
          <button onclick="deleteTeam()" class="w-full bg-red-500/10 hover:bg-red-500/20 border border-red-500/30 text-red-400 text-sm py-2.5 rounded-xl transition font-medium">
            Delete Team
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Confirm Modal -->
  <div id="confirmModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center px-4">
    <div class="modal-overlay absolute inset-0 bg-black/60" onclick="closeConfirmModal()"></div>
    <div class="relative bg-ink-800 border border-white/15 rounded-2xl p-6 w-full max-w-md shadow-2xl fade-up">
      <h2 id="confirmTitle" class="text-base font-semibold text-white mb-2"></h2>
      <p id="confirmMessage" class="text-sm text-gray-400 leading-relaxed mb-6"></p>
      <div class="flex gap-3">
        <button type="button" onclick="closeConfirmModal()" class="flex-1 bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 py-2.5 rounded-xl transition text-sm">Cancel</button>
        <button type="button" id="confirmActionBtn" onclick="runConfirmAction()" class="flex-1 text-white font-medium py-2.5 rounded-xl transition text-sm">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Alert Modal -->
  <div id="alertModal" class="hidden fixed inset-0 z-[60] flex items-center justify-center px-4">
    <div class="modal-overlay absolute inset-0 bg-black/60" onclick="closeAlertModal()"></div>
    <div class="relative bg-ink-800 border border-white/15 rounded-2xl p-6 w-full max-w-md shadow-2xl fade-up">
      <h2 id="alertTitle" class="text-base font-semibold text-white mb-2">Something went wrong</h2>
      <p id="alertMessage" class="text-sm text-gray-400 leading-relaxed mb-6"></p>
      <button type="button" onclick="closeAlertModal()" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-medium py-2.5 rounded-xl transition text-sm">OK</button>
    </div>
  </div>

  <!-- Add Task Modal -->
  <div id="addTaskModal" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4">
    <div class="modal-overlay absolute inset-0 bg-black/60" onclick="closeAddTask()"></div>
    <div class="relative bg-ink-800 border border-white/15 rounded-2xl p-6 w-full max-w-lg shadow-2xl fade-up">
      <h2 class="text-base font-semibold text-white mb-5">Add Task</h2>
      <div class="space-y-3">
        <input id="taskTitle" type="text" placeholder="Task title"
          class="w-full bg-ink-700 border border-white/10 rounded-xl px-4 py-2.5 text-white placeholder-gray-600 focus:outline-none focus:border-brand-500 transition text-sm" />
        <textarea id="taskDesc" placeholder="Description (optional)" rows="2"
          class="w-full bg-ink-700 border border-white/10 rounded-xl px-4 py-2.5 text-white placeholder-gray-600 focus:outline-none focus:border-brand-500 transition text-sm resize-none"></textarea>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-gray-500 text-xs mb-1.5">Priority</label>
            <select id="taskPriority" class="w-full bg-ink-700 border border-white/10 rounded-xl px-3 py-2.5 text-white focus:outline-none focus:border-brand-500 transition text-sm">
              <option value="urgent">🔴 Urgent</option>
              <option value="high">🟠 High</option>
              <option value="medium" selected>🟡 Medium</option>
              <option value="low">🟢 Low</option>
            </select>
          </div>
          <div>
            <label class="block text-gray-500 text-xs mb-1.5">Due Date</label>
            <input id="taskDue" type="date"
              class="w-full bg-ink-700 border border-white/10 rounded-xl px-3 py-2.5 text-white focus:outline-none focus:border-brand-500 transition text-sm" />
          </div>
        </div>
        <div>
          <label class="block text-gray-500 text-xs mb-1.5">Assign to</label>
          <select id="taskAssignee" class="w-full bg-ink-700 border border-white/10 rounded-xl px-3 py-2.5 text-white focus:outline-none focus:border-brand-500 transition text-sm">
            <option value="">Unassigned</option>
          </select>
        </div>
        <div class="flex gap-3 pt-2">
          <button onclick="closeAddTask()" class="flex-1 bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 py-2.5 rounded-xl transition text-sm">Cancel</button>
          <button onclick="submitTask()" class="flex-1 bg-brand-500 hover:bg-brand-600 text-white font-medium py-2.5 rounded-xl transition text-sm">Add Task</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Task Detail Modal -->
  <div id="taskModal" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4">
    <div class="modal-overlay absolute inset-0 bg-black/60" onclick="closeTaskModal()"></div>
    <div class="relative bg-ink-800 border border-white/15 rounded-2xl w-full max-w-2xl shadow-2xl max-h-[90vh] flex flex-col">
      <!-- Task Header -->
      <div class="p-6 border-b border-white/10">
        <div class="flex items-start justify-between gap-3">
          <div class="flex-1 min-w-0">
            <div id="taskDetailPriority" class="text-xs font-medium mb-2"></div>
            <h2 id="taskDetailTitle" class="text-lg font-semibold text-white leading-snug"></h2>
          </div>
          <div class="flex items-center gap-2 shrink-0">
            <button id="taskDeleteBtn" onclick="deleteTask()" class="text-gray-500 hover:text-red-400 transition p-1.5 rounded-lg hover:bg-red-500/10">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
            </button>
            <button onclick="closeTaskModal()" class="text-gray-500 hover:text-white transition p-1.5 rounded-lg hover:bg-white/10">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Tabs -->
      <div class="flex border-b border-white/10 px-6">
        <button class="tab-active text-sm py-3 mr-6 transition-colors" onclick="switchTab('details')">Details</button>
        <button class="tab-inactive text-sm py-3 mr-6 transition-colors" onclick="switchTab('comments')">Comments <span id="commentCount" class="text-xs bg-white/10 rounded-full px-1.5 py-0.5 ml-1">0</span></button>
      </div>

      <!-- Tab content -->
      <div class="flex-1 overflow-y-auto">
        <!-- Details tab -->
        <div id="tab-details" class="p-6 space-y-4">
          <div id="taskDetailDesc" class="text-gray-400 text-sm leading-relaxed"></div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-gray-500 text-xs mb-1.5 uppercase tracking-wider">Status</label>
              <select id="detailStatus" onchange="updateTaskField('status', this.value)"
                class="w-full bg-ink-700 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500 transition">
                <option value="todo">To Do</option>
                <option value="doing">Doing</option>
                <option value="done">Done</option>
              </select>
            </div>
            <div>
              <label class="block text-gray-500 text-xs mb-1.5 uppercase tracking-wider">Priority</label>
              <select id="detailPriority" onchange="updateTaskField('priority', this.value)"
                class="w-full bg-ink-700 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500 transition">
                <option value="urgent">Urgent</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
              </select>
            </div>
            <div>
              <label class="block text-gray-500 text-xs mb-1.5 uppercase tracking-wider">Due Date</label>
              <input id="detailDue" type="date" onchange="updateTaskField('due_date', this.value)"
                class="w-full bg-ink-700 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500 transition" />
            </div>
            <div>
              <label class="block text-gray-500 text-xs mb-1.5 uppercase tracking-wider">Assignee</label>
              <select id="detailAssignee" onchange="updateTaskField('assigned_to', this.value || null)"
                class="w-full bg-ink-700 border border-white/10 rounded-lg px-3 py-2 text-white text-sm focus:outline-none focus:border-brand-500 transition">
                <option value="">Unassigned</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-gray-500 text-xs mb-1.5 uppercase tracking-wider">Created by</label>
            <p id="detailCreator" class="text-sm text-gray-300"></p>
          </div>
        </div>

        <!-- Comments tab -->
        <div id="tab-comments" class="hidden flex flex-col h-full">
          <div id="commentsList" class="flex-1 p-6 space-y-4 overflow-y-auto max-h-64"></div>
          <div class="p-4 border-t border-white/10">
            <div class="flex gap-2">
              <input id="commentInput" type="text" placeholder="Add a comment..."
                class="flex-1 bg-ink-700 border border-white/10 rounded-xl px-4 py-2.5 text-white placeholder-gray-600 text-sm focus:outline-none focus:border-brand-500 transition" />
              <button onclick="submitComment()" class="bg-brand-500 hover:bg-brand-600 text-white text-sm px-4 py-2.5 rounded-xl transition font-medium">Send</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="/api.js"></script>
  <script>
    const teamId = window.location.pathname.split('/').pop();
    let currentUser = null;
    let teamData = null;
    let tasks = [];
    let activeTaskId = null;
    let draggedTaskId = null;
    let addTaskStatus = 'todo';
    let pollInterval = null;
    let confirmCallback = null;

    function showConfirm({ title, message, confirmLabel = 'Confirm', danger = false, onConfirm }) {
      document.getElementById('confirmTitle').textContent = title;
      document.getElementById('confirmMessage').textContent = message;
      const btn = document.getElementById('confirmActionBtn');
      btn.textContent = confirmLabel;
      btn.className = danger
        ? 'flex-1 bg-red-500 hover:bg-red-600 text-white font-medium py-2.5 rounded-xl transition text-sm'
        : 'flex-1 bg-brand-500 hover:bg-brand-600 text-white font-medium py-2.5 rounded-xl transition text-sm';
      confirmCallback = onConfirm;
      document.getElementById('confirmModal').classList.remove('hidden');
    }

    function closeConfirmModal() {
      document.getElementById('confirmModal').classList.add('hidden');
      confirmCallback = null;
    }

    function runConfirmAction() {
      const cb = confirmCallback;
      closeConfirmModal();
      if (cb) cb();
    }

    function showAlert(message, title = 'Something went wrong') {
      document.getElementById('alertTitle').textContent = title;
      document.getElementById('alertMessage').textContent = message;
      document.getElementById('alertModal').classList.remove('hidden');
    }

    function closeAlertModal() {
      document.getElementById('alertModal').classList.add('hidden');
    }

    const PRIORITY_CONFIG = {
      urgent: { label: '🔴 Urgent', color: 'text-red-400', bg: 'bg-red-500/10 text-red-400' },
      high:   { label: '🟠 High',   color: 'text-orange-400', bg: 'bg-orange-500/10 text-orange-400' },
      medium: { label: '🟡 Medium', color: 'text-yellow-400', bg: 'bg-yellow-500/10 text-yellow-400' },
      low:    { label: '🟢 Low',    color: 'text-green-400', bg: 'bg-green-500/10 text-green-400' },
    };

    async function init() {
      const r = await apiFetch('/api/me');
      if (r.status === 401) return window.location = '/login';
      if (!r.ok) return;
      currentUser = await parseJsonResponse(r);
      if (currentUser.error) return;
      await loadTeam();
      await loadTasks();
      startPolling();
    }

    async function loadTeam() {
      const r = await apiFetch(`/api/teams/${teamId}`);
      if (!r.ok) return window.location = '/dashboard';
      teamData = await r.json();
      document.title = `TaskFlow — ${teamData.name}`;
      document.getElementById('teamName').textContent = teamData.name;
      renderMemberAvatars(teamData.members);
      renderMemberList(teamData.members);
      populateAssigneeDropdowns(teamData.members);
      if (teamData.userRole === 'owner') {
        document.getElementById('settingsNavBtn').classList.remove('hidden');
        renderSettingsMemberList(teamData.members);
      }
    }

    function renderMemberAvatars(members) {
      const container = document.getElementById('memberAvatars');
      container.innerHTML = members.slice(0, 4).map(m =>
        `<div class="w-7 h-7 rounded-full border-2 border-ink-900 flex items-center justify-center text-white text-xs font-bold" style="background:${m.avatar_color}" title="${escHtml(m.username)}">${m.username[0].toUpperCase()}</div>`
      ).join('');
    }

    function renderMemberList(members) {
      document.getElementById('memberList').innerHTML = members.map(m => `
        <div class="flex items-center gap-3 p-2 rounded-xl hover:bg-white/5">
          <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold shrink-0" style="background:${m.avatar_color}">${m.username[0].toUpperCase()}</div>
          <div class="flex-1 min-w-0">
            <p class="text-sm text-white font-medium truncate">${escHtml(m.username)}</p>
            <p class="text-xs text-gray-500 truncate">${escHtml(m.email)}</p>
          </div>
          <span class="text-xs px-2 py-0.5 rounded-full ${m.role === 'owner' ? 'bg-brand-500/20 text-brand-500' : 'bg-white/10 text-gray-400'}">${m.role}</span>
        </div>`).join('');
      if (!['owner','admin'].includes(teamData?.userRole)) {
        document.getElementById('inviteSection').classList.add('hidden');
      }
    }

    function populateAssigneeDropdowns(members) {
      const opts = '<option value="">Unassigned</option>' + members.map(m =>
        `<option value="${m.id}">${escHtml(m.username)}</option>`).join('');
      document.getElementById('taskAssignee').innerHTML = opts;
      document.getElementById('detailAssignee').innerHTML = opts;
    }

    async function loadTasks() {
      const r = await apiFetch(`/api/teams/${teamId}/tasks`);
      tasks = await r.json();
      renderBoard();
    }

    function renderBoard() {
      ['todo','doing','done'].forEach(status => {
        const col = document.getElementById(`col-${status}`);
        const colTasks = tasks.filter(t => t.status === status);
        document.getElementById(`count-${status}`).textContent = colTasks.length;
        col.innerHTML = '';
        colTasks.forEach(task => {
          col.appendChild(createTaskCard(task));
        });
      });
    }

    function createTaskCard(task) {
      const el = document.createElement('div');
      el.className = `task-card bg-ink-800 border border-white/10 hover:border-white/20 rounded-xl p-3.5 priority-${task.priority} fade-up`;
      el.dataset.id = task.id;
      el.draggable = true;
      el.addEventListener('dragstart', (e) => { draggedTaskId = task.id; el.classList.add('dragging'); });
      el.addEventListener('dragend', () => el.classList.remove('dragging'));
      el.onclick = () => openTaskModal(task.id);

      const due = task.due_date ? formatDue(task.due_date) : null;
      const pc = PRIORITY_CONFIG[task.priority] || PRIORITY_CONFIG.medium;

      el.innerHTML = `
        <div class="flex items-start justify-between gap-2 mb-2">
          <p class="text-sm text-white font-medium leading-snug">${escHtml(task.title)}</p>
          <span class="text-xs px-1.5 py-0.5 rounded-md ${pc.bg} shrink-0">${pc.label}</span>
        </div>
        ${task.description ? `<p class="text-xs text-gray-500 mb-2.5 line-clamp-2">${escHtml(task.description)}</p>` : ''}
        <div class="flex items-center justify-between mt-2">
          ${task.assignee ? `<div class="flex items-center gap-1.5">
            <div class="w-5 h-5 rounded-full flex items-center justify-center text-white text-xs font-bold" style="background:${task.assignee.avatar_color}">${task.assignee.username[0].toUpperCase()}</div>
            <span class="text-xs text-gray-500">${escHtml(task.assignee.username)}</span>
          </div>` : '<div></div>'}
          ${due ? `<span class="text-xs font-medium ${due.class}">${due.label}</span>` : ''}
        </div>`;
      return el;
    }

    function formatDue(dateStr) {
      const due = new Date(dateStr + 'T00:00:00');
      const today = new Date(); today.setHours(0,0,0,0);
      const diff = Math.round((due - today) / 86400000);
      if (diff < 0) return { label: `${Math.abs(diff)}d overdue`, class: 'overdue' };
      if (diff === 0) return { label: 'Due today', class: 'due-soon' };
      if (diff <= 3) return { label: `Due in ${diff}d`, class: 'due-soon' };
      return { label: due.toLocaleDateString('en-US', { month:'short', day:'numeric' }), class: 'text-gray-500' };
    }

    // Drag & Drop
    function dragOver(e) {
      e.preventDefault();
      e.currentTarget.closest('.kanban-col').classList.add('drag-over');
    }
    function dragLeave(e) {
      if (!e.currentTarget.contains(e.relatedTarget))
        e.currentTarget.closest('.kanban-col')?.classList.remove('drag-over');
    }
    async function drop(e) {
      e.preventDefault();
      const col = e.currentTarget.closest('.kanban-col');
      col.classList.remove('drag-over');
      const newStatus = col.dataset.status;
      const task = tasks.find(t => t.id === draggedTaskId);
      if (!task || task.status === newStatus) return;
      task.status = newStatus;
      renderBoard();
      await apiFetch(`/api/tasks/${draggedTaskId}`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ status: newStatus })
      });
    }

    // Add Task
    let addTaskStatusTarget = 'todo';
    function openAddTask(status) {
      addTaskStatusTarget = status;
      document.getElementById('addTaskModal').classList.remove('hidden');
      setTimeout(() => document.getElementById('taskTitle').focus(), 50);
    }
    function closeAddTask() {
      document.getElementById('addTaskModal').classList.add('hidden');
      ['taskTitle','taskDesc'].forEach(id => document.getElementById(id).value = '');
    }
    async function submitTask() {
      const title = document.getElementById('taskTitle').value.trim();
      if (!title) return;
      const r = await apiFetch(`/api/teams/${teamId}/tasks`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          title,
          description: document.getElementById('taskDesc').value.trim(),
          status: addTaskStatusTarget,
          priority: document.getElementById('taskPriority').value,
          due_date: document.getElementById('taskDue').value || null,
          assigned_to: document.getElementById('taskAssignee').value || null
        })
      });
      const task = await r.json();
      if (task.error) return;
      tasks.push(task);
      renderBoard();
      closeAddTask();
    }

    // Task Detail Modal
    function openTaskModal(taskId) {
      activeTaskId = taskId;
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      const pc = PRIORITY_CONFIG[task.priority];
      document.getElementById('taskDetailTitle').textContent = task.title;
      document.getElementById('taskDetailDesc').textContent = task.description || 'No description provided.';
      document.getElementById('taskDetailPriority').innerHTML = `<span class="px-2 py-0.5 rounded-md text-xs ${pc.bg}">${pc.label}</span>`;
      document.getElementById('detailStatus').value = task.status;
      document.getElementById('detailPriority').value = task.priority;
      document.getElementById('detailDue').value = task.due_date ? task.due_date.split('T')[0] : '';
      document.getElementById('detailAssignee').value = task.assigned_to || '';
      document.getElementById('detailCreator').textContent = task.creator?.username || 'Unknown';
      document.getElementById('taskModal').classList.remove('hidden');
      loadComments(taskId);
      switchTab('details');
    }
    function closeTaskModal() {
      document.getElementById('taskModal').classList.add('hidden');
      activeTaskId = null;
    }

    function switchTab(tab) {
      ['details','comments'].forEach(t => {
        document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
        const btns = document.querySelectorAll('.tab-active, .tab-inactive');
      });
      document.querySelectorAll('[onclick^="switchTab"]').forEach(btn => {
        const t = btn.getAttribute('onclick').match(/'(\w+)'/)[1];
        btn.className = t === tab ? 'tab-active text-sm py-3 mr-6 transition-colors' : 'tab-inactive text-sm py-3 mr-6 transition-colors';
      });
    }

    async function updateTaskField(field, value) {
      if (!activeTaskId) return;
      const r = await apiFetch(`/api/tasks/${activeTaskId}`, {
        method: 'PATCH', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ [field]: value })
      });
      const updated = await r.json();
      if (!updated.error) {
        const idx = tasks.findIndex(t => t.id === activeTaskId);
        if (idx !== -1) tasks[idx] = updated;
        renderBoard();
      }
    }

    async function deleteTask() {
      if (!activeTaskId || !confirm('Delete this task?')) return;
      await apiFetch(`/api/tasks/${activeTaskId}`, { method: 'DELETE' });
      tasks = tasks.filter(t => t.id !== activeTaskId);
      closeTaskModal();
      renderBoard();
    }

    async function loadComments(taskId) {
      const r = await apiFetch(`/api/tasks/${taskId}/comments`);
      const comments = await r.json();
      document.getElementById('commentCount').textContent = comments.length;
      document.getElementById('commentsList').innerHTML = comments.map(c => `
        <div class="flex gap-3">
          <div class="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold shrink-0" style="background:${c.user.avatar_color}">${c.user.username[0].toUpperCase()}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1">
              <span class="text-xs font-medium text-white">${escHtml(c.user.username)}</span>
              <span class="text-xs text-gray-600">${timeAgo(c.created_at)}</span>
            </div>
            <p class="text-sm text-gray-300 leading-relaxed">${escHtml(c.content)}</p>
          </div>
        </div>`).join('') || '<p class="text-sm text-gray-600 text-center py-4">No comments yet.</p>';
    }

    async function submitComment() {
      const input = document.getElementById('commentInput');
      const content = input.value.trim();
      if (!content || !activeTaskId) return;
      const r = await apiFetch(`/api/tasks/${activeTaskId}/comments`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ content })
      });
      if (r.ok) {
        input.value = '';
        loadComments(activeTaskId);
      }
    }

    function closeAllSidePanels() {
      document.getElementById('activityPanel').classList.add('hidden');
      document.getElementById('teamPanel').classList.add('hidden');
      document.getElementById('settingsPanel').classList.add('hidden');
    }

    // Activity Panel
    function openActivityPanel() {
      closeAllSidePanels();
      document.getElementById('activityPanel').classList.remove('hidden');
      loadActivity();
    }
    function closeActivityPanel() { document.getElementById('activityPanel').classList.add('hidden'); }
    function openTeamPanel() {
      closeAllSidePanels();
      document.getElementById('teamPanel').classList.remove('hidden');
    }
    function closeTeamPanel() { document.getElementById('teamPanel').classList.add('hidden'); }

    // Settings Panel (owners only)
    function openSettingsPanel() {
      if (teamData?.userRole !== 'owner') return;
      closeAllSidePanels();
      document.getElementById('settingsPanel').classList.remove('hidden');
      renderSettingsMemberList(teamData.members);
    }
    function closeSettingsPanel() { document.getElementById('settingsPanel').classList.add('hidden'); }

    function renderSettingsMemberList(members) {
      document.getElementById('settingsMemberList').innerHTML = members.map(m => `
        <div class="flex items-center gap-3 p-2 rounded-xl hover:bg-white/5">
          <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-bold shrink-0" style="background:${m.avatar_color}">${m.username[0].toUpperCase()}</div>
          <div class="flex-1 min-w-0">
            <p class="text-sm text-white font-medium truncate">${escHtml(m.username)}</p>
            <p class="text-xs text-gray-500 truncate">${escHtml(m.email)}</p>
          </div>
          <span class="text-xs px-2 py-0.5 rounded-full ${m.role === 'owner' ? 'bg-brand-500/20 text-brand-500' : 'bg-white/10 text-gray-400'}">${m.role}</span>
          ${m.role !== 'owner' ? `<button type="button" class="remove-member-btn text-gray-500 hover:text-red-400 transition p-1.5 rounded-lg hover:bg-red-500/10" data-user-id="${m.id}" data-username="${escHtml(m.username)}" title="Remove member">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
          </button>` : ''}
        </div>`).join('');
    }

    function removeMember(userId, username) {
      const name = username || teamData?.members?.find(m => String(m.id) === String(userId))?.username;
      if (!name) return;
      showConfirm({
        title: 'Remove member',
        message: `Remove ${name} from this team? They will lose access to all tasks and activity.`,
        confirmLabel: 'Remove',
        danger: true,
        onConfirm: () => executeRemoveMember(userId),
      });
    }

    async function executeRemoveMember(userId) {
      const r = await apiFetch(`/api/teams/${teamId}/members/${userId}`, { method: 'DELETE' });
      const d = await r.json();
      if (!r.ok) {
        showAlert(d.error || 'Failed to remove member');
        return;
      }
      await loadTeam();
      renderSettingsMemberList(teamData.members);
    }

    function deleteTeam() {
      const name = teamData?.name || 'this team';
      showConfirm({
        title: 'Delete team',
        message: `Delete "${name}" permanently? All tasks, comments, and activity will be lost. This cannot be undone.`,
        confirmLabel: 'Delete team',
        danger: true,
        onConfirm: () => executeDeleteTeam(),
      });
    }

    async function executeDeleteTeam() {
      const r = await apiFetch(`/api/teams/${teamId}`, { method: 'DELETE' });
      const d = await r.json();
      if (!r.ok) {
        showAlert(d.error || 'Failed to delete team');
        return;
      }
      window.location = '/dashboard';
    }

    async function loadActivity() {
      const r = await apiFetch(`/api/teams/${teamId}/activity`);
      const logs = await r.json();
      document.getElementById('activityList').innerHTML = logs.map(l => `
        <div class="flex gap-3">
          <div class="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold shrink-0 mt-0.5" style="background:${l.user?.avatar_color || '#4f6ef7'}">${(l.user?.username || '?')[0].toUpperCase()}</div>
          <div class="flex-1 min-w-0">
            <p class="text-xs text-gray-300 leading-relaxed">${escHtml(l.description)}</p>
            <p class="text-xs text-gray-600 mt-1">${timeAgo(l.created_at)}</p>
          </div>
        </div>`).join('') || '<p class="text-sm text-gray-600 text-center py-4">No activity yet.</p>';
    }

    // Invite
    async function inviteMember() {
      const email = document.getElementById('inviteEmail').value.trim();
      if (!email) return;
      const r = await apiFetch(`/api/teams/${teamId}/invite`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email })
      });
      const d = await r.json();
      const msg = document.getElementById('inviteMsg');
      msg.classList.remove('hidden');
      if (d.success) {
        msg.className = 'text-xs mt-2 text-emerald-400';
        msg.textContent = `✓ ${d.user.username} added to team!`;
        document.getElementById('inviteEmail').value = '';
        await loadTeam();
      } else {
        msg.className = 'text-xs mt-2 text-red-400';
        msg.textContent = d.error;
      }
    }

    // Real-time polling
    function startPolling() {
      pollInterval = setInterval(async () => {
        const r = await apiFetch(`/api/teams/${teamId}/tasks`);
        if (!r.ok) return;
        const newTasks = await parseJsonResponse(r);
        if (!Array.isArray(newTasks)) return;
        if (JSON.stringify(newTasks) !== JSON.stringify(tasks)) {
          tasks = newTasks;
          renderBoard();
          if (document.getElementById('activityPanel').offsetParent !== null) loadActivity();
        }
      }, 5000);
    }

    // Helpers
    function timeAgo(dateStr) {
      const diff = Date.now() - new Date(dateStr).getTime();
      const mins = Math.floor(diff / 60000);
      if (mins < 1) return 'just now';
      if (mins < 60) return `${mins}m ago`;
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return `${hrs}h ago`;
      return `${Math.floor(hrs / 24)}d ago`;
    }

    function escHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    document.getElementById('commentInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitComment();
    });

    document.getElementById('settingsMemberList').addEventListener('click', (e) => {
      const btn = e.target.closest('.remove-member-btn');
      if (!btn) return;
      removeMember(btn.dataset.userId, btn.dataset.username);
    });

    init();
  </script>
</body>
</html>
