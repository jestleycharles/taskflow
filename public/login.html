<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ['Space Mono', 'monospace'], sans: ['DM Sans', 'sans-serif'] },
          colors: {
            brand: { 50:'#f0f4ff', 100:'#e0e9ff', 500:'#4f6ef7', 600:'#3a57e8', 700:'#2d45cc' },
            ink: { DEFAULT:'#0f1117', 800:'#1a1d2e', 700:'#252840', 600:'#363952' },
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0f1117; }
    .grid-bg {
      background-image: linear-gradient(rgba(79,110,247,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,110,247,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .glow { box-shadow: 0 0 60px rgba(79,110,247,0.15), 0 0 120px rgba(79,110,247,0.05); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #1a1d2e inset !important; -webkit-text-fill-color: #fff !important; }
  </style>
</head>
<body class="grid-bg min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md fade-up">
    <!-- Logo -->
    <div class="text-center mb-10">
      <div class="inline-flex items-center gap-2 mb-4">
        <div class="w-10 h-10 bg-brand-500 rounded-xl flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
          </svg>
        </div>
        <span class="font-mono text-xl text-white font-bold tracking-tight">TaskFlow</span>
      </div>
      <p class="text-gray-400 text-sm">Team task management, simplified.</p>
    </div>

    <!-- Card -->
    <div class="bg-ink-800 border border-white/10 rounded-2xl p-8 glow">
      <h1 class="text-white font-semibold text-xl mb-6">Sign in to your account</h1>

      <div id="error" class="hidden bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg px-4 py-3 mb-5"></div>

      <div class="space-y-4">
        <div>
          <label class="block text-gray-400 text-xs font-medium uppercase tracking-wider mb-1.5">Email</label>
          <input id="email" type="email" placeholder="you@example.com"
            class="w-full bg-ink-700 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition text-sm" />
        </div>
        <div>
          <label class="block text-gray-400 text-xs font-medium uppercase tracking-wider mb-1.5">Password</label>
          <input id="password" type="password" placeholder="••••••••"
            class="w-full bg-ink-700 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition text-sm" />
        </div>
        <button id="loginBtn" onclick="login()"
          class="w-full bg-brand-500 hover:bg-brand-600 text-white font-medium py-3 rounded-xl transition text-sm mt-2">
          Sign In
        </button>
      </div>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
        <div class="relative text-center"><span class="bg-ink-800 px-3 text-gray-500 text-xs uppercase tracking-wider">or</span></div>
      </div>

      <button onclick="guestLogin()"
        class="w-full bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 font-medium py-3 rounded-xl transition text-sm flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
        Continue as Guest
      </button>

      <p class="text-center text-gray-500 text-sm mt-6">
        Don't have an account?
        <a href="/register" class="text-brand-500 hover:text-brand-400 font-medium ml-1">Create one</a>
      </p>
    </div>
  </div>

  <script>
    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Signing in...'; btn.disabled = true;
      const r = await fetch('/api/auth/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password })
      });
      const d = await r.json();
      if (d.success) return window.location = '/dashboard';
      showError(d.error);
      btn.textContent = 'Sign In'; btn.disabled = false;
    }

    async function guestLogin() {
      const r = await fetch('/api/auth/guest', { method: 'POST' });
      const d = await r.json();
      if (d.success) return window.location = '/dashboard';
      showError(d.error);
    }

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg; el.classList.remove('hidden');
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
  </script>
</body>
</html>
