<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no" />
  <title>TaskFlow — Register</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/portrait-orientation.css" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <meta name="theme-color" content="#4f6ef7" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <script src="/viewport-breakpoints.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        screens: window.TF_VIEWPORT.TAILWIND_SCREENS,
        extend: {
          fontFamily: { mono: ['Space Mono', 'monospace'], sans: ['DM Sans', 'sans-serif'] },
          colors: {
            brand: { 500:'#4f6ef7', 600:'#3a57e8' },
            ink: { DEFAULT:'#0f1117', 800:'#1a1d2e', 700:'#252840' }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'DM Sans', sans-serif; background: #0f1117; }
    .grid-bg {
      background-image: linear-gradient(rgba(79,110,247,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,110,247,0.07) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .glow { box-shadow: 0 0 60px rgba(79,110,247,0.15), 0 0 120px rgba(79,110,247,0.05); }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #252840 inset !important; -webkit-text-fill-color: #fff !important; }
  </style>
</head>
<body class="grid-bg min-h-screen flex items-center justify-center px-4 py-10 portrait-locked">
  <div class="w-full max-w-md fade-up">
    <div class="text-center mb-10">
      <a href="/login" class="inline-flex items-center gap-2 mb-4">
        <div class="w-10 h-10 bg-brand-500 rounded-xl flex items-center justify-center">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4" />
          </svg>
        </div>
        <span class="font-mono text-xl text-white font-bold tracking-tight">TaskFlow</span>
      </a>
      <p class="text-gray-400 text-sm">Create your free account.</p>
    </div>

    <div class="bg-ink-800 border border-white/10 rounded-2xl p-8 glow">
      <h1 class="text-white font-semibold text-xl mb-6">Create account</h1>
      <div id="inviteBanner" class="hidden"></div>
      <div id="error" class="hidden bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg px-4 py-3 mb-5"></div>

      <div class="space-y-4">
        <div>
          <label class="block text-gray-400 text-xs font-medium uppercase tracking-wider mb-1.5">Username</label>
          <input id="username" type="text" placeholder="yourname"
            class="w-full bg-ink-700 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition text-sm" />
        </div>
        <div>
          <label class="block text-gray-400 text-xs font-medium uppercase tracking-wider mb-1.5">Email</label>
          <input id="email" type="email" placeholder="you@example.com"
            class="w-full bg-ink-700 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition text-sm" />
        </div>
        <div>
          <label class="block text-gray-400 text-xs font-medium uppercase tracking-wider mb-1.5">Password</label>
          <input id="password" type="password" placeholder="Min. 8 characters"
            class="w-full bg-ink-700 border border-white/10 rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition text-sm" />
        </div>
        <button id="regBtn" onclick="register()"
          class="w-full bg-brand-500 hover:bg-brand-600 text-white font-medium py-3 rounded-xl transition text-sm mt-2">
          Create Account
        </button>
      </div>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/10"></div></div>
        <div class="relative text-center"><span class="bg-ink-800 px-3 text-gray-500 text-xs uppercase tracking-wider">or</span></div>
      </div>

      <div class="grid grid-cols-2 gap-3">
        <button type="button" onclick="signInWithGoogle()"
          class="bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 font-medium py-3 rounded-xl transition text-sm flex items-center justify-center gap-2">
          <svg class="w-4 h-4" viewBox="0 0 24 24" aria-hidden="true"><path fill="#EA4335" d="M12 10.2v3.6h5c-.2 1.2-1.5 3.6-5 3.6-3 0-5.4-2.5-5.4-5.6S9 6.2 12 6.2c1.7 0 2.9.7 3.6 1.3l2.5-2.4C16.9 3.6 14.6 2.6 12 2.6 6.9 2.6 2.8 6.7 2.8 12S6.9 21.4 12 21.4c6.9 0 8.5-4.8 8.5-7.2 0-.5 0-.9-.1-1.2H12z"/></svg>
          Google
        </button>
        <button type="button" onclick="signInWithGitHub()"
          class="bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 font-medium py-3 rounded-xl transition text-sm flex items-center justify-center gap-2">
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C6.48 2 2 6.58 2 12.26c0 4.52 2.87 8.34 6.84 9.7.5.1.68-.22.68-.48 0-.24-.01-.87-.01-1.7-2.78.62-3.37-1.36-3.37-1.36-.45-1.18-1.12-1.5-1.12-1.5-.92-.65.07-.64.07-.64 1.02.07 1.55 1.07 1.55 1.07.9 1.57 2.36 1.12 2.94.86.09-.67.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.07 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.32.1-2.74 0 0 .84-.27 2.75 1.03A9.3 9.3 0 0112 6.84c.85 0 1.71.12 2.51.34 1.91-1.3 2.75-1.03 2.75-1.03.55 1.42.2 2.48.1 2.74.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.81-4.57 5.07.36.32.68.94.68 1.9 0 1.37-.01 2.47-.01 2.8 0 .27.18.59.69.49A10.03 10.03 0 0022 12.26C22 6.58 17.52 2 12 2z"/></svg>
          GitHub
        </button>
      </div>

      <button type="button" data-pwa-install
        class="hidden w-full mt-4 bg-white/5 hover:bg-white/10 border border-white/10 text-gray-300 font-medium py-3 rounded-xl transition text-sm flex items-center justify-center gap-2">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
        </svg>
        Install app on your phone
      </button>

      <p class="text-center text-gray-500 text-sm mt-6">
        Already have an account?
        <a id="loginLink" href="/login" class="text-brand-500 hover:text-brand-400 font-medium ml-1">Sign in</a>
      </p>
    </div>
  </div>

  <script src="/mobile-orientation.js"></script>
  <script src="/pwa-install.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/api.js"></script>
  <script src="/auth-oauth.js"></script>
  <script>
    async function register() {
      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('regBtn');
      if (password.length < 8) return showError('Password must be at least 8 characters');
      btn.textContent = 'Creating...'; btn.disabled = true;
      const r = await apiFetch('/api/auth/register', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ username, email, password })
      });
      const d = await parseJsonResponse(r);
      if (d.success) return window.location = authRedirectUrl(d);
      showError(d.error || 'Registration failed');
      btn.textContent = 'Create Account'; btn.disabled = false;
    }
    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg; el.classList.remove('hidden');
    }
  </script>
</body>
</html>
